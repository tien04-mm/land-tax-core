server:
  port: 8080

spring:
  application:
    name: land-tax-core-service

  datasource:
    url: jdbc:mysql://localhost:3306/land_tax_management
    username: root
    password:
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

# JWT Configuration - SHARED SECRET KEY (phải giống hệt với vneid-auth-service)
jwt:
  secret: ${JWT_SECRET:ThangLong2025VNeIDLandTaxSharedSecretKeyForJWTAuth!@#$%}

# VNeID Auth Service
vneid:
  service:
    url: http://localhost:9090

# Internal API Security
internal:
  api:
    secret: ${INTERNAL_API_SECRET:VNeIDInternalSecretKey2025}

# Cloudinary Configuration
cloudinary:
  cloud-name: ${CLOUDINARY_CLOUD_NAME:mock-cloud-name}
  api-key: ${CLOUDINARY_API_KEY:mock-api-key}
  api-secret: ${CLOUDINARY_API_SECRET:mock-api-secret}

# Gemini AI Configuration
gemini:
  api-key: ${GEMINI_API_KEY:mock-gemini-key-for-testing}

# PayOS Configuration
payos:
  client-id: "e007b95d-45b9-4916-bf47-404c4f6c7807"
  api-key: "1ab4a6a8-795b-4edd-b280-5d7a9269d553"
  checksum-key: 731809ff42999f81c86efea0ac37b1b4a518241767a512543006e9475ed57d6c
  # Hai URL này phải là địa chỉ Front-end (của người dân dùng)
  return-url: http://localhost:3000/payment/success
  cancel-url: http://localhost:3000/payment/cancel

# ──────────────────────────────────────────────
# File Upload Configuration
# ──────────────────────────────────────────────
app:
  upload:
    dir: ${UPLOAD_DIR:uploads}        # Thư mục lưu file vật lý (tương đối với working dir)
  server:
    base-url: ${SERVER_BASE_URL:http://localhost:8080}  # Base URL để tạo file_url

servlet:
    multipart:
      enabled: true
      max-file-size: 20MB            # Giới hạn kích thước mỗi file
      max-request-size: 50MB          # Giới hạn kích thước toàn bộ request
 
